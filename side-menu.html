<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side menu - Paradise Hotel Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="desktop-layout">
    <div class="prototype overlay-prototype side-overlay">
      <div class="overlay-bg"><img class="frame-img" src="assets/screens/website-main.png" alt=""></div>
      <div class="overlay-scrim"></div>
      <a class="overlay-dismiss" href="index.html" aria-label="Đóng menu"></a>
      <div class="side-menu-panel desktop-side-panel">
        <img class="frame-img" src="assets/screens/website-side-menu.png" alt="">
        <a class="hotspot" href="index.html" style="left:3%;top:11%;width:88%;height:4%;" aria-label="Trang chủ"></a>
        <a class="hotspot" href="past-booking.html" style="left:3%;top:15%;width:88%;height:4%;" aria-label="Đặt phòng"></a>
        <a class="hotspot" href="wish.html" style="left:3%;top:19%;width:88%;height:4%;" aria-label="Yêu thích"></a>
        <a class="hotspot" href="account.html" style="left:3%;top:23%;width:88%;height:4%;" aria-label="Tài khoản"></a>
      </div>
    </div>
  </div>
  <div class="mobile-layout">
    <div class="prototype overlay-prototype side-overlay">
      <div class="overlay-bg"><img class="frame-img" src="assets/screens/mobile-main-content.png" alt=""></div>
      <div class="overlay-scrim"></div>
      <a class="overlay-dismiss" href="index.html" aria-label="Đóng menu"></a>
      <div class="side-menu-panel mobile-side-panel">
        <img class="frame-img" src="assets/screens/mobile-side-menu.png" alt="">
        <a class="hotspot" href="index.html" style="left:5%;top:12%;width:88%;height:5%;" aria-label="Trang chủ"></a>
        <a class="hotspot" href="past-booking.html" style="left:5%;top:18%;width:88%;height:5%;" aria-label="Đặt phòng"></a>
        <a class="hotspot" href="wish.html" style="left:5%;top:24%;width:88%;height:5%;" aria-label="Yêu thích"></a>
        <a class="hotspot" href="account.html" style="left:5%;top:30%;width:88%;height:5%;" aria-label="Tài khoản"></a>
      </div>
    </div>
  </div>
</body>
</html>
