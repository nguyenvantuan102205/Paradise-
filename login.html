<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Paradise Hotel Prototype</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="desktop-layout">
      <div class="prototype desktop-prototype">
        <div class="frame-shell">
          <img
            class="frame-img"
            src="assets/screens/website-login.png"
            alt=""
          />
          <a
            class="hotspot"
            href="index.html"
            style="left: 64%; top: 47%; width: 32%; height: 6%"
            aria-label="index.html"
          ></a>
          <a
            class="hotspot"
            href="signup.html"
            style="left: 86%; top: 55%; width: 10%; height: 4%"
            aria-label="signup.html"
          ></a>
        </div>
      </div>
    </div>
    <div class="mobile-layout">
      <div class="prototype mobile-prototype">
        <div class="frame-shell">
          <img class="frame-img" src="assets/screens/mobile-login.png" alt="" />
          <a
            class="hotspot"
            href="index.html"
            style="left: 4%; top: 50%; width: 92%; height: 7%"
            aria-label="index.html"
          ></a>
          <a
            class="hotspot"
            href="signup.html"
            style="left: 78%; top: 59%; width: 17%; height: 4%"
            aria-label="signup.html"
          ></a>
        </div>
      </div>
    </div>
  </body>
</html>
